<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Lakshmimata — NSE Scanner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #0a0d12;
        color: #e2e8f0;
        font-family: 'Inter', 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: #080b10; }
      ::-webkit-scrollbar-thumb { background: #1c2333; border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: #2a3550; }
      select, input, button {
        font-family: inherit;
        font-size: 12px;
      }
      button { cursor: pointer; }
      /* Dual-handle range slider fix — with two overlapping full-width
         range inputs (the standard technique for a two-thumb slider
         without a library), whichever input has the higher z-index
         intercepts EVERY click on the track, not just clicks near its
         own thumb — making the other handle unreachable whenever a
         click lands somewhere the "wrong" input's z-index wins,
         regardless of how far apart the two thumbs actually are.
         Standard fix: make each input's track ignore clicks entirely
         (pointer-events: none), then re-enable clicks specifically on
         its own thumb via the pseudo-element. Each handle now only
         responds to being dragged directly, never intercepts a click
         meant for the other one. */
      .dual-range-input {
        pointer-events: none;
        -webkit-appearance: none;
        appearance: none;
        background: transparent;
      }
      .dual-range-input::-webkit-slider-thumb {
        pointer-events: auto;
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #4f8ef7;
        border: 2px solid #0a0d12;
        box-shadow: 0 0 0 1px #4f8ef7;
        cursor: pointer;
      }
      .dual-range-input::-moz-range-thumb {
        pointer-events: auto;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #4f8ef7;
        border: 2px solid #0a0d12;
        box-shadow: 0 0 0 1px #4f8ef7;
        cursor: pointer;
      }
      .dual-range-input::-moz-range-track {
        background: transparent;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
